name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # Generate a stable signing key once and commit it, so every build is
      # signed identically and the app updates in place (no uninstall needed).
      - name: Ensure persistent signing keystore
        run: |
          if [ ! -f app/livetranscribe.keystore ]; then
            keytool -genkeypair -v -keystore app/livetranscribe.keystore \
              -storepass livetranscribe -keypass livetranscribe -alias livetranscribe \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=LiveTranscribe"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f app/livetranscribe.keystore
            git commit -m "Add persistent signing keystore [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      # Auto mode's offline engine (sherpa-onnx). Fetched at build time so the
      # repo stays lean; .gitignore excludes these paths. Libs + Kotlin API are
      # pinned to the same release; models come from stable model tags.
      - name: Fetch sherpa-onnx libs, Kotlin API and models
        run: |
          set -euo pipefail
          API=https://api.github.com/repos/k2-fsa/sherpa-onnx
          DL=https://github.com/k2-fsa/sherpa-onnx/releases/download
          TAG=$(curl -fsSL $API/releases/latest | jq -r .tag_name)
          echo "Using sherpa-onnx $TAG"

          # 1) native libs (arm64-v8a)
          AAR_URL=$(curl -fsSL $API/releases/tags/$TAG \
            | jq -r '.assets[] | select(.name|test("android.*\\.tar\\.bz2$")) | .browser_download_url' | head -1)
          echo "libs: $AAR_URL"
          curl -fL -o sherpa-android.tar.bz2 "$AAR_URL"
          mkdir -p tmp_libs app/src/main/jniLibs/arm64-v8a
          tar xf sherpa-android.tar.bz2 -C tmp_libs
          find tmp_libs -path '*arm64-v8a*' -name '*.so' -exec cp {} app/src/main/jniLibs/arm64-v8a/ \;
          ls -la app/src/main/jniLibs/arm64-v8a/

          # 2) Kotlin API at the same tag
          mkdir -p app/src/main/java/com/k2fsa/sherpa/onnx
          for f in $(curl -fsSL "$API/contents/sherpa-onnx/kotlin-api?ref=$TAG" \
              | jq -r '.[] | select(.name|endswith(".kt")) | .name'); do
            curl -fL -o "app/src/main/java/com/k2fsa/sherpa/onnx/$f" \
              "https://raw.githubusercontent.com/k2-fsa/sherpa-onnx/$TAG/sherpa-onnx/kotlin-api/$f"
          done
          ls app/src/main/java/com/k2fsa/sherpa/onnx/

          # 3) offline models into assets
          A=app/src/main/assets
          mkdir -p "$A"
          curl -fL -o "$A/silero_vad.onnx" "$DL/asr-models/silero_vad.onnx"
          curl -fL -o whisper.tar.bz2 "$DL/asr-models/sherpa-onnx-whisper-base.en.tar.bz2"
          tar xf whisper.tar.bz2
          cp sherpa-onnx-whisper-base.en/base.en-encoder.int8.onnx "$A/"
          cp sherpa-onnx-whisper-base.en/base.en-decoder.int8.onnx "$A/"
          cp sherpa-onnx-whisper-base.en/base.en-tokens.txt "$A/"
          curl -fL -o "$A/speaker.onnx" "$DL/speaker-recongition-models/nemo_en_titanet_small.onnx"
          ls -la "$A"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      # Hard proof the shipped APK can't reach the network: list its permissions
      # straight from the built artifact and fail if INTERNET is present.
      - name: Verify APK has no network permission
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          AAPT=$(find "$ANDROID_HOME" -name aapt -type f 2>/dev/null | sort | tail -1)
          echo "Using: $AAPT"
          PERMS=$("$AAPT" dump permissions "$APK")
          echo "$PERMS"
          if echo "$PERMS" | grep -qiE "permission.*(INTERNET|ACCESS_NETWORK_STATE)"; then
            echo "::error::APK declares a network permission — refusing to ship."
            exit 1
          fi
          echo "Confirmed: APK declares no INTERNET / network permission."

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ../LiveTranscribe.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveTranscribe-apk
          path: LiveTranscribe.apk

      - name: Create release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Live Transcribe v1.0.${{ github.run_number }}
          files: LiveTranscribe.apk
